name: Bug Report
description: Report something that's not working correctly
title: "[BUG] "

labels: [bug]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        Describe el problema encontrado.

  - type: textarea
    id: reproduction
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error

    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      placeholder: Qué debería pasar

    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
      placeholder: Qué pasa actualmente

    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: [e.g. Windows 11, Ubuntu 22.04]
        - Node.js version:
        - CodeShield version:

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low (minor issue, workaround exists)
        - medium (some functionality broken)
        - high (core functionality broken)
        - critical (data loss, security issue)

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: "He buscado issues similares"
        - label: "Estoy usando la última versión"
        - label: "Incluí logs o screenshots relevantes"