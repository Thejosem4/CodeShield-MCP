name: "Security Vulnerability"
description: "Report a security issue (DO NOT disclose vulnerabilities in public issues)"
title: "Security: [Description]"
labels: ["security"]
body:
  - type: textarea
    id: vulnerability
    attributes:
      label: "Vulnerability Description"
      description: "Detailed description of the security issue."
      placeholder: "This vulnerability allows..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the vulnerability."
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. Observe..."
    validations:
      required: true

  - type: textarea
    id: fix
    attributes:
      label: "Suggested Fix"
      description: "If you have a suggested fix, describe it here."
      placeholder: "The fix should involve..."
    validations:
      required: false