name: "Bug Report"
description: "Report a bug to help us improve"
title: "Bug: [Description]"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of the bug."
      placeholder: "Describe the bug in detail..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the bug."
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What should happen."
      placeholder: "Expected behavior is..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
      description: "What actually happens."
      placeholder: "Actual behavior is..."
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: "Operating System"
      description: "Your OS (e.g., Windows 11, macOS, Ubuntu)"
      placeholder: "Windows 11"
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: "Node.js Version"
      description: "Output of `node --version`"
      placeholder: "v20.x.x"
    validations:
      required: false

  - type: input
    id: npm-version
    attributes:
      label: "npm Version"
      description: "Output of `npm --version`"
      placeholder: "10.x.x"
    validations:
      required: false