# CodeShield Configuration Template
# Copy this to .codeshield/.codeshield.yaml and customize

detection:
  # Languages to analyze
  languages:
    - python
    - javascript
    - typescript

  # Enable auto-fix when errors are detected
  auto_fix: true

  # Strict mode: fail on any detected issue
  strict_mode: false

  # What to detect
  patterns:
    imports: true      # Non-existent imports
    functions: true    # Non-existent functions/methods
    classes: true      # Non-existent classes
    variables: true    # Undefined variables
    syntax: true       # Basic syntax errors
    logic: false       # Logic issues (future)

# Index settings
index:
  # Directories to index (relative to project root)
  include:
    - src/
    - lib/
    - app/

  # Exclude from indexing
  exclude:
    - node_modules/
    - venv/
    - .git/
    - __pycache__/

# Logging
logging:
  level: info  # debug, info, warning, error
  file: .codeshield/logs/codeshield.log